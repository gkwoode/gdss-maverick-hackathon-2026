services:
  - type: web
    name: gdss-maverick-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/products/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gdss-maverick-hackathon-2026.vercel.app"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gdss-maverick-db
          property: connectionString
      - key: MEDIA_ROOT
        value: "media"
      - key: MEDIA_URL
        value: "/media/"

databases:
  - name: gdss-maverick-db
    plan: free
