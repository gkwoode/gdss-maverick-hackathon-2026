services:
  - type: web
    name: gdss-maverick-backend
    runtime: python
    # Render is running native Python (not Docker) — use buildCommand/startCommand
    buildCommand: >-
      cd backend &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput
    startCommand: >-
      cd backend &&
      python manage.py migrate --noinput &&
      gunicorn imdb_project.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120
      --log-level info
    plan: free
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "True"   # Temporarily True; set back to False once stable
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gdss-maverick-hackathon-2026.vercel.app"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gdss-maverick-db
          property: connectionString
      - key: MEDIA_ROOT
        value: "media"
      - key: MEDIA_URL
        value: "/media/"
      - key: DJANGO_SETTINGS_MODULE
        value: "imdb_project.settings"

databases:
  - name: gdss-maverick-db
    plan: free
