services:
  - type: web
    name: gdss-maverick-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.vercel.app"
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gdss-maverick-hackathon-2026.vercel.app,http://localhost:3000,http://localhost:3002"
      - key: DATABASE_URL
        fromDatabase:
          name: gdss-maverick-db
          property: connectionString

databases:
  - name: gdss-maverick-db
    plan: free
    envVars:
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        value: postgres