services:
  - type: web
    name: gdss-maverick-backend
    runtime: python
    # Commands run from the repo root; cd backend navigates into the Django project
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    # preDeployCommand runs BEFORE traffic switches — migrate here for zero-downtime deploys
    preDeployCommand: python manage.py migrate --noinput
    # migrate runs here because preDeployCommand is a paid-plan feature and is skipped on free tier
    startCommand: python manage.py migrate --noinput && gunicorn imdb_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    plan: free
    healthCheckPath: /
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: imdb_project.settings
      - key: DEBUG
        value: "True"   # Set back to False once stable
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gdss-maverick-hackathon-2026.vercel.app"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false   # Set to ft:gpt-4o-mini-... after fine-tuning completes
      - key: DATABASE_URL
        fromDatabase:
          name: gdss-maverick-db
          property: connectionString
      - key: MEDIA_ROOT
        value: "media"
      - key: MEDIA_URL
        value: "/media/"

databases:
  - name: gdss-maverick-db
    plan: free
    databaseName: gdss_maverick_db
    user: gdss_maverick_user
